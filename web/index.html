<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>PreLease Grid</title>
    <style>
      #root {
        display: flex;
        height: 100vh;
        width: 100vw;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: Montserrat, sans-serif;
      }
      
      @font-face {
        font-family: 'Avenir LT Pro';
        src: url('/assets/fonts/AvenirLTProRoman.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: 'Avenir LT Pro';
        src: url('/assets/fonts/AvenirLTProMedium.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: 'Avenir LT Pro';
        src: url('/assets/fonts/AvenirLTProHeavy.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
      }

      @font-face {
        font-family: 'Avenir LT Pro';
        src: url('/assets/fonts/AvenirLTProBlack.otf') format('opentype');
        font-weight: 900;
        font-style: normal;
      }

      /* Display numeric input arrows (spin buttons) on hover */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      
      input[type="number"]:hover::-webkit-inner-spin-button,
      input[type="number"]:hover::-webkit-outer-spin-button {
        -webkit-appearance: inner-spin-button !important;
        opacity: 1 !important;
        cursor: pointer;
      }
      
      input[type="number"] {
        -moz-appearance: textfield;
      }
      
      input[type="number"]:hover {
        -moz-appearance: number-input;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
